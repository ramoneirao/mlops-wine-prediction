<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado da Previsão</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.3);
            --primary-color: #5a189a;
            --secondary-color: #7b2cbf;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: url('{{ url_for("static", filename="img/bg.png") }}') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            padding: 50px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h2 {
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 20px;
        }

        .prediction-value {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }

        .btn-back {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 10px 30px;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 30px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-back:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2>Resultado da Previsão</h2>
        <p class="text-muted">A qualidade estimada para este vinho é:</p>
        <div class="prediction-value">{{ prediction }}</div>
        <a href="/" class="btn-back">Voltar ao Início</a>
    </div>
</body>
</html>
